allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  maplibre-gl: true
  sharp: true
  simple-git-hooks: true
  unrs-resolver: true
  vue-demi: true
  workerd: true
minimumReleaseAgeExclude:
  - '@nuxtjs/i18n@10.4.1'
  - eslint@10.7.0
  - virtua@0.49.3
onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild
  - maplibre-gl
  - sharp
  - simple-git-hooks
  - unrs-resolver
  - vue-demi
  - workerd
